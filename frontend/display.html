<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Display — QMS</title>
  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="display-screen">
    <header class="screen-header">
      <div class="screen-header-logos">
        <img src="./assets/logos/city-logo.png" weight="75" height="75" alt="Maasin City Logo">
        <img src="./assets/logos/occr-logo.png" weight="75" height="75" alt="City Civil Registrar's Office Logo">
      </div>
      <h1>Queue <span>Display</span></h1>
      <div class="clock" id="clock">--:--:--</div>
    </header>
    <div class="counters" id="counters-area">
      <!-- Rendered by JS -->
    </div>

    <footer class="screen-footer">
      <div class="footer-stat">Total Served: <span id="total-served">0</span></div>
      <div class="footer-stat">Now Serving: <span id="active-count">0</span></div>
      <div class="conn-indicator">
        <div class="dot" id="conn-dot"></div>
        <span id="conn-label">Connecting…</span>
      </div>
    </footer>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let state = {};
    let prevActive = {};

    // ── Voice announcements (Display only) ─────────────────────────────────────
    const audioQueue = [];
    let isSpeaking = false;

    socket.on('number:called', (payload) => {
      if (!payload || typeof payload !== 'object') return;
      const { ticket, lane, counterName, timestamp } = payload;
      if (typeof ticket !== 'string') return;
      if (typeof counterName !== 'string') return;
      if (typeof timestamp !== 'number') return;

      audioQueue.push({ ticket, lane, counterName, timestamp });
      processAudioQueue();
    });

    async function processAudioQueue() {
      if (isSpeaking) return;
      isSpeaking = true;

      try {
        while (audioQueue.length) {
          const item = audioQueue.shift();
          try {
            await speakCalledNumber(item, 0);
          } catch (_) {
            try {
              await speakCalledNumber(item, 1);
            } catch (_) {
              // Skip after one retry; continue queue.
            }
          }
        }
      } finally {
        isSpeaking = false;
      }
    }

    function speakCalledNumber({ ticket, lane, counterName }, attempt) {
      return new Promise((resolve, reject) => {
        if (!('speechSynthesis' in window) || typeof SpeechSynthesisUtterance === 'undefined') {
          return reject(new Error('speech not supported'));
        }

        const isPriority = lane === 'priority' || (typeof ticket === 'string' && ticket.startsWith('P'));
        const text = isPriority
          ? `Priority ${ticket.replace(/^P/, '')}, you may now proceed at ${counterName}`
          : `Number ${ticket}, you may now proceed at ${counterName}`;
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US';

        const voices = window.speechSynthesis.getVoices?.() || [];
        const enVoice = voices.find(v => (v.lang || '').toLowerCase().startsWith('en'));
        if (enVoice) u.voice = enVoice;

        const watchdogMs = 12000;
        const watchdog = setTimeout(() => reject(new Error('speech timeout')), watchdogMs);

        u.onend = () => {
          clearTimeout(watchdog);
          resolve();
        };
        u.onerror = () => {
          clearTimeout(watchdog);
          reject(new Error('speech error'));
        };

        setTimeout(() => {
          try {
            window.speechSynthesis.speak(u);
          } catch (e) {
            clearTimeout(watchdog);
            reject(e);
          }
        }, 500);
      });
    }

    // ── Clock ─────────────────────────────────────────────────────────────────
    function tickClock() {
      document.getElementById('clock').textContent =
        new Date().toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    tickClock();
    setInterval(tickClock, 1000);

    // ── Connection ────────────────────────────────────────────────────────────
    const $dot   = document.getElementById('conn-dot');
    const $label = document.getElementById('conn-label');

    socket.on('connect', () => {
      $dot.classList.add('on');
      $label.textContent = 'Live';
    });

    socket.on('disconnect', () => {
      $dot.classList.remove('on');
      $label.textContent = 'Disconnected';
    });

    // ── State ─────────────────────────────────────────────────────────────────
    socket.on('state', newState => {
      const oldActive = { ...state.activeNumbers };
      state = newState;
      render(oldActive);
    });

    function render(oldActive = {}) {
      const area = document.getElementById('counters-area');
      const counters = state.counters || [];
      const activeNums = state.activeNumbers || {};

      // Rebuild layout
      area.innerHTML = '';
      counters.forEach(c => {
        const active = activeNums[c.id];
        const hasNum = active !== undefined;
        const lane = active?.lane || (typeof active === 'string' && active.startsWith('P') ? 'priority' : 'regular');
        const display = active?.display ?? active;
        const changed = hasNum && ((oldActive[c.id]?.display ?? oldActive[c.id]) !== display);

        const panel = document.createElement('div');
        panel.className = 'counter-panel' + (hasNum ? ' has-number' : '') + (hasNum && lane === 'priority' ? ' priority' : '');
        panel.id = `panel-${c.id}`;

        panel.innerHTML = `
          <div class="counter-panel-label">Counter ${c.id}</div>
          <div class="counter-panel-name">${c.name}</div>
          <div class="counter-number ${hasNum ? '' : 'idle'}" id="num-${c.id}">
            ${hasNum ? display : '·'}
          </div>
          ${hasNum && lane === 'priority' ? `<div class="priority-line">${display} — Counter ${c.id} — Priority</div>` : ''}
          <div class="counter-status ${hasNum ? 'serving' : ''}">
            ${hasNum ? (lane === 'priority' ? 'Now Serving · Priority' : 'Now Serving') : (state.started ? 'Waiting…' : 'Idle')}
          </div>
        `;

        area.appendChild(panel);

        if (changed) {
          const numEl = document.getElementById(`num-${c.id}`);
          numEl.classList.remove('flash');
          void numEl.offsetWidth;
          numEl.classList.add('flash');
        }
      });

      // Footer
      document.getElementById('total-served').textContent = state.completedNumbers?.length ?? 0;
      document.getElementById('active-count').textContent = Object.keys(activeNums).length;
    }
  </script>
  </div>
</body>
</html>
